"$schema" = "https://starship.rs/config-schema.json"

add_newline = false

format = "$username[@](yellow)$hostname[:](white)$directory$git_branch$git_status$line_break${custom.prompt_user}${custom.prompt_root}"
right_format = "$status${custom.re5et_date}$time"

[username]
show_always = true
style_user = "bold cyan"
style_root = "bold cyan"
format = "[$user]($style)"
disabled = false

[hostname]
ssh_only = false
trim_at = ""
format = "[$hostname](bold blue)"
disabled = false

[directory]
style = "bold green"
format = "[$path]($style)"
truncation_length = 99
truncate_to_repo = false
home_symbol = "~"
read_only = ""

[git_branch]
symbol = ""
format = "[^](bold magenta)[$branch](bold yellow)"
truncation_length = 99
truncation_symbol = ""

[git_status]
format = "[$all_status$ahead_behind](bold red)"
conflicted = "="
ahead = " ⇡${count}"
behind = " ⇣${count}"
diverged = " ⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""
untracked = " ?"
stashed = ""
modified = " ±"
staged = ""
renamed = ""
deleted = ""
typechanged = ""

[status]
disabled = false
format = "[:( $status](bold red) "
map_symbol = false
recognize_signal_code = false

[time]
disabled = false
time_format = "%H:%M:%S"
format = "[$time](bright-black)"

[custom.re5et_date]
command = "date '+%y-%m-%d'"
when = true
use_stdin = false
shell = ["sh", "-c"]
format = "[$output](bright-black) "

[custom.prompt_user]
command = "printf '%%'"
when = "test \"$(id -u)\" -ne 0"
use_stdin = false
shell = ["sh", "-c"]
format = "[$output](magenta) "

[custom.prompt_root]
command = "printf '#'"
when = "test \"$(id -u)\" -eq 0"
use_stdin = false
shell = ["sh", "-c"]
format = "[$output](red) "
